name: rainbow-triangle-web
services:
  server:
    build:
      context: ../
      dockerfile: web/Dockerfile
      args:
        UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
    ports:
      - "8080:80"
    restart: unless-stopped

  cloudflare:
    image: cloudflare/cloudflared:2026.6.0
    volumes:
      - ./.cloudflare:/home/nonroot/.cloudflared
    restart: unless-stopped
    command: tunnel run ${TUNNEL_ID:-default}
