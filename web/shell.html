<body>
  <div id="game-container">
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <div id="loader">
      <div class="spinner"></div>
      <div id="status">Loading...</div>
    </div>
  </div>

  <a href="https://github.com/chris-cadev/rainbow-triangle/releases"
     target="_blank" rel="noopener noreferrer"
     id="download-btn" data-umami-event="Download">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M8 1v9M4 7l4 4 4-4M2 13v1h12v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
    </svg>
    Download
  </a>
  <script>
    (function() {
      var isMobileUA = /Mobi|Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini|KAIOS/i.test(navigator.userAgent);
      var isTouchDevice = window.matchMedia('(pointer: coarse)').matches;
      var isNarrow = window.innerWidth < 1024;
      if (isMobileUA || (isTouchDevice && isNarrow)) {
        var el = document.getElementById('download-btn');
        if (el) el.remove();
      }
    })();
  </script>

  <script type='text/javascript'>
    var statusElement = document.querySelector('#status');
    var spinnerElement = document.querySelector('.spinner');
    var loaderElement = document.querySelector('#loader');

    var Module = {
      preRun: [function() {
        if (typeof JSEvents !== 'undefined' && !JSEvents.lastGamepadState) {
          JSEvents.lastGamepadState = [];
        }
      }],
      postRun: [function() {
        loaderElement.style.display = 'none';
        if (typeof umami !== 'undefined') umami.track('Game Loaded');
      }],
      print: (function() {
        return function(text) {
          console.log(text);
        };
      })(),
      printErr: function(text) {
        console.error(text);
      },
      canvas: (function() {
        var canvas = document.querySelector('#canvas');
        canvas.addEventListener("webglcontextlost", function(e) {
          alert('WebGL context lost. Please reload the page.');
          e.preventDefault();
        }, false);
        return canvas;
      })(),
      setStatus: function(text) {
        if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
        if (text === Module.setStatus.last.text) return;

        var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        var now = Date.now();
        if (m && now - Module.setStatus.last.time < 30) return;

        Module.setStatus.last.time = now;
        Module.setStatus.last.text = text;

        if (m) {
          text = m[1];
          spinnerElement.style.display = '';
        } else {
          if (!text) {
            spinnerElement.style.display = 'none';
            loaderElement.style.display = 'none';
          }
        }
        statusElement.innerHTML = text;
      },
      totalDependencies: 0,
      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
      }
    };

    Module.setStatus('Downloading...');

    var loadTimer = setTimeout(function() {
      var msg = 'Loading timed out. Check that your browser supports WebAssembly and WebGL 2.0.';
      Module.setStatus(msg);
      spinnerElement.style.display = 'none';
      Module.setStatus = function(text) { if (text) Module.printErr('[timeout] ' + text); };
    }, 60000);

    window.onerror = function() {
      clearTimeout(loadTimer);
      Module.setStatus('Exception thrown, see console');
      spinnerElement.style.display = 'none';
      Module.setStatus = function(text) { if (text) Module.printErr('[post-exception] ' + text); };
      if (typeof umami !== 'undefined') umami.track('Page Error');
    };

    var origOnAbort = Module.onAbort;
    Module.onAbort = function() {
      clearTimeout(loadTimer);
      if (origOnAbort) origOnAbort();
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
