name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSYS2 (toolchain)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-make

      - name: Set up MSYS2 (extras)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-cmake mingw-w64-x86_64-upx

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ \
            libgl1-mesa-dev \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev \
            upx

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake upx

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make release

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: make release

      - name: Compress with UPX (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: upx --best --lzma rainbow-triangle.exe

      - name: Compress with UPX (Linux)
        if: runner.os == 'Linux'
        run: upx --best --lzma rainbow-triangle

      - name: Compress with UPX (macOS)
        if: runner.os == 'macOS'
        run: upx --best --lzma --force-macos rainbow-triangle

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: mv rainbow-triangle.exe rainbow-triangle-${{ runner.os }}-${{ runner.arch }}.exe

      - name: Rename binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv rainbow-triangle rainbow-triangle-${{ runner.os }}-${{ runner.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rainbow-triangle-${{ runner.os }}-${{ runner.arch }}
          path: rainbow-triangle-*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: |
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD~ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$(git describe --tags --abbrev=0 HEAD~ 2>/dev/null || echo '')...${{ github.ref_name }}" >> RELEASE_NOTES.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            **/rainbow-triangle-*
